version: v1.0
name: Finance API - CI Pipeline
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2204

# Dispara em todo push, conforme exigido pelo TP.
# O deploy (release stage) só é promovido automaticamente quando o push é na main.

blocks:
  # ---------------------------------------------------------------
  # 1. ETAPA DE COMMIT: build da aplicação + testes de unidade e integração
  # ---------------------------------------------------------------
  - name: "Commit Stage: Build + Testes de Unidade/Integração"
    task:
      jobs:
        - name: Build e testes
          commands:
            - checkout
            - sem-version python 3.11
            - pip install --upgrade pip
            - pip install -r requirements.txt
            - cache restore
            - cache store
            - echo "Verificando build da aplicação"
            - python -c "from app.main import app; print('Build OK:', app.title)"
            - echo "Rodando testes de unidade e integração"
            - pytest tests/test_unit_services.py tests/test_integration_api.py -v

  # ---------------------------------------------------------------
  # 2. ETAPA DE TESTE DE ACEITAÇÃO
  # ---------------------------------------------------------------
  - name: "Acceptance Stage: Teste de Aceitação E2E"
    task:
      jobs:
        - name: Teste de aceitação
          commands:
            - checkout
            - sem-version python 3.11
            - pip install --upgrade pip
            - pip install -r requirements.txt
            - echo "Rodando teste de aceitação end-to-end"
            - pytest tests/test_acceptance.py -v

# ---------------------------------------------------------------
# 3. ETAPA DE LANÇAMENTO: promovida automaticamente apenas na branch main
# ---------------------------------------------------------------
promotions:
  - name: "Release Stage: Deploy"
    pipeline_file: deploy.yml
    auto_promote:
      when: "branch = 'main' AND result = 'passed'"
